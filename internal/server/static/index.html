<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortener</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 28px;
            width: 100%;
            max-width: 480px;
            margin-bottom: 16px;
        }

        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 10px 14px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.95rem;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #555; }

        button {
            width: 100%;
            padding: 10px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .msg {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.875rem;
            display: none;
        }

        .msg.success { background: #0d2b1a; color: #4ade80; border: 1px solid #166534; }
        .msg.error   { background: #2b0d0d; color: #f87171; border: 1px solid #991b1b; }

        .result-url {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }

        .result-url a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.95rem;
            word-break: break-all;
        }

        .result-url a:hover { text-decoration: underline; }

        .copy-btn {
            width: auto;
            padding: 6px 12px;
            font-size: 0.8rem;
            background: #333;
            color: #fff;
            flex-shrink: 0;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: #888;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .urls-list { margin-top: 12px; }

        .url-item {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .url-item .code {
            font-weight: 600;
            color: #60a5fa;
            font-size: 0.95rem;
        }

        .url-item .long {
            color: #888;
            font-size: 0.8rem;
            margin-top: 2px;
            word-break: break-all;
        }

        .url-item .actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .url-item .actions button {
            width: auto;
            padding: 4px 10px;
            font-size: 0.8rem;
            background: #222;
            color: #ccc;
            border: 1px solid #333;
        }

        .url-item .actions button.del {
            color: #f87171;
            border-color: #991b1b;
        }

        #auth-section { display: block; }
        #app-section  { display: none; }

        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 480px;
        }

        .user-bar span { color: #888; font-size: 0.875rem; }

        .logout-btn {
            width: auto;
            padding: 6px 14px;
            font-size: 0.8rem;
            background: #222;
            color: #ccc;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<h1>Shortener</h1>
<p class="subtitle">Shorten URLs. Track clicks.</p>

<!-- AUTH SECTION -->
<div id="auth-section">
    <div class="card">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login -->
        <div id="tab-login" class="tab-content active">
            <input id="login-username" type="text" placeholder="Username" />
            <input id="login-password" type="password" placeholder="Password" />
            <button onclick="login()">Login</button>
            <div id="login-msg" class="msg"></div>
        </div>

        <!-- Register -->
        <div id="tab-register" class="tab-content">
            <input id="reg-username" type="text" placeholder="Username" />
            <input id="reg-email" type="email" placeholder="Email" />
            <input id="reg-password" type="password" placeholder="Password" />
            <button onclick="register()">Create account</button>
            <div id="reg-msg" class="msg"></div>
        </div>
    </div>
</div>

<!-- APP SECTION (shown after login) -->
<div id="app-section">
    <div class="user-bar">
        <span id="user-label"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- Shorten -->
    <div class="card">
        <h2>Shorten a URL</h2>
        <input id="long-url" type="url" placeholder="https://example.com/very/long/url" />
        <input id="custom-code" type="text" placeholder="Custom code (optional, 4-20 chars)" />
        <button onclick="shorten()">Shorten</button>
        <div id="shorten-msg" class="msg"></div>
        <div id="shorten-result" class="result-url" style="display:none">
            <a id="short-link" href="#" target="_blank"></a>
            <button class="copy-btn" onclick="copyLink()">Copy</button>
        </div>
    </div>

    <!-- My URLs -->
    <div class="card">
        <h2>My URLs</h2>
        <button onclick="loadURLs()" style="background:#222;color:#ccc;border:1px solid #333">Refresh</button>
        <div id="urls-list" class="urls-list"></div>
    </div>
</div>

<script>
    let token = localStorage.getItem('token') || ''
    let username = localStorage.getItem('username') || ''

    // restore session
    if (token) showApp()

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'))
        })
        document.getElementById('tab-login').classList.toggle('active', tab === 'login')
        document.getElementById('tab-register').classList.toggle('active', tab === 'register')
    }

    function showMsg(id, text, type) {
        const el = document.getElementById(id)
        el.textContent = text
        el.className = `msg ${type}`
        el.style.display = 'block'
    }

    async function register() {
        const body = {
            username: document.getElementById('reg-username').value.trim(),
            email: document.getElementById('reg-email').value.trim(),
            password: document.getElementById('reg-password').value,
        }
        const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        })
        if (res.ok) {
            showMsg('reg-msg', 'Account created! You can now login.', 'success')
        } else {
            const text = await res.text()
            showMsg('reg-msg', text || 'Registration failed', 'error')
        }
    }

    async function login() {
        const body = {
            username: document.getElementById('login-username').value.trim(),
            password: document.getElementById('login-password').value,
        }
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        })
        if (res.ok) {
            const data = await res.json()
            token = data.token
            username = body.username
            localStorage.setItem('token', token)
            localStorage.setItem('username', username)
            showApp()
        } else {
            showMsg('login-msg', 'Invalid username or password', 'error')
        }
    }

    function logout() {
        token = ''
        username = ''
        localStorage.removeItem('token')
        localStorage.removeItem('username')
        document.getElementById('auth-section').style.display = 'block'
        document.getElementById('app-section').style.display = 'none'
    }

    function showApp() {
        document.getElementById('auth-section').style.display = 'none'
        document.getElementById('app-section').style.display = 'block'
        document.getElementById('user-label').textContent = `Logged in as ${username}`
        loadURLs()
    }

    async function shorten() {
        const longURL = document.getElementById('long-url').value.trim()
        const customCode = document.getElementById('custom-code').value.trim()
        if (!longURL) {
            showMsg('shorten-msg', 'Please enter a URL', 'error')
            return
        }
        const body = { long_url: longURL }
        if (customCode) body.custom_code = customCode

        const res = await fetch('/api/urls', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
            },
            body: JSON.stringify(body),
        })
        if (res.ok) {
            const data = await res.json()
            const shortURL = `${window.location.origin}/${data.short_code}`
            document.getElementById('short-link').href = shortURL
            document.getElementById('short-link').textContent = shortURL
            document.getElementById('shorten-result').style.display = 'flex'
            document.getElementById('shorten-msg').style.display = 'none'
            document.getElementById('long-url').value = ''
            document.getElementById('custom-code').value = ''
            loadURLs()
        } else {
            const text = await res.text()
            showMsg('shorten-msg', text || 'Failed to shorten URL', 'error')
            document.getElementById('shorten-result').style.display = 'none'
        }
    }

    function copyLink() {
        const url = document.getElementById('short-link').textContent
        navigator.clipboard.writeText(url)
    }

    async function loadURLs() {
        const res = await fetch('/api/urls', {
            headers: { 'Authorization': `Bearer ${token}` },
        })
        if (!res.ok) return
        const urls = await res.json()
        const list = document.getElementById('urls-list')
        if (!urls || urls.length === 0) {
            list.innerHTML = '<p style="color:#555;font-size:0.875rem;margin-top:12px">No URLs yet.</p>'
            return
        }
        list.innerHTML = urls.map(u => `
            <div class="url-item">
                <div class="code">/${u.short_code}</div>
                <div class="long">${u.long_url}</div>
                <div class="actions">
                    <button onclick="window.open('/${u.short_code}')">Visit</button>
                    <button onclick="deleteURL('${u.short_code}')">Delete</button>
                </div>
            </div>
        `).join('')
    }

    async function deleteURL(code) {
        const res = await fetch(`/api/urls/${code}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` },
        })
        if (res.ok) loadURLs()
    }
</script>
</body>
</html>
